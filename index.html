<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="阿光音樂製作｜混音、編曲、免費宅錄與 Beat 伴奏作品集。" />
  <meta name="theme-color" content="#090d0c" />
  <title>阿光音樂製作｜混音・編曲・免費宅錄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ambient ambient-a" aria-hidden="true"></div>
  <div class="ambient ambient-b" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <header class="site-header" id="top">
    <a class="brand" href="#top" aria-label="回到首頁">
      <span class="brand-mark" data-brand-mark>A</span>
      <span><strong data-brand-name>阿光音樂製作</strong><small data-brand-en>A-KUANG MUSIC</small></span>
    </a>
    <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav"><span></span><span></span><span class="sr-only">開啟選單</span></button>
    <nav class="site-nav" id="site-nav" aria-label="主要導覽"></nav>
  </header>

  <main id="page-sections">
    <section class="hero section-shell" data-fixed-section="hero">
      <div class="hero-copy reveal">
        <p class="eyebrow" data-hero-eyebrow></p>
        <h1><span data-hero-before></span><em data-hero-highlight></em><span data-hero-after></span></h1>
        <p class="hero-text" data-hero-description></p>
        <div class="hero-actions">
          <a class="button button-primary" data-hero-primary></a>
          <a class="button button-secondary" data-hero-secondary></a>
        </div>
        <div class="hero-points" data-hero-chips></div>
      </div>

      <div class="hero-visual reveal">
        <div class="studio-ring ring-one"></div><div class="studio-ring ring-two"></div>
        <div class="mascot-stage">
          <div class="frequency frequency-a"></div><div class="frequency frequency-b"></div>
          <img class="hero-mascot" data-hero-mascot alt="阿光音樂製作角色形象" />
          <div class="floating-card floating-card-a"><span>VOCAL</span><strong>READY</strong></div>
          <div class="floating-card floating-card-b"><span>SESSION</span><strong>48 kHz</strong></div>
          <div class="mini-console">
            <div><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
            <span>AK MUSIC LAB</span>
          </div>
        </div>
      </div>
    </section>

    <section class="stats-bar" data-fixed-section="stats" aria-label="合作優勢"></section>

    <section class="section-shell section-space content-section" id="works" data-section="works">
      <div class="section-heading reveal"><div><p class="eyebrow" data-works-eyebrow></p><h2 data-works-title></h2></div><p data-works-description></p></div>
      <div class="work-grid" id="work-grid"></div>
    </section>

    <section class="service-section section-space content-section" id="services" data-section="services">
      <div class="section-shell">
        <div class="section-heading light reveal"><div><p class="eyebrow" data-services-eyebrow></p><h2 data-services-title></h2></div><p data-services-description></p></div>
        <div class="service-grid" id="service-grid"></div>
      </div>
    </section>

    <section class="section-shell section-space process-section content-section" id="process" data-section="process">
      <div class="section-heading reveal"><div><p class="eyebrow" data-process-eyebrow></p><h2 data-process-title></h2></div><p data-process-description></p></div>
      <div class="process-grid" id="process-grid"></div>
    </section>

    <section class="beat-section section-space content-section" id="beat-store" data-section="beat-store">
      <div class="section-shell beat-shell">
        <div class="beat-intro reveal"><p class="eyebrow" data-beat-eyebrow></p><h2 data-beat-title></h2><p data-beat-description></p><a class="button button-primary" data-beat-button></a></div>
        <div class="beat-panel glass-card reveal">
          <div class="beat-toolbar"><strong>BEAT CATALOG</strong><div class="beat-filters" id="beat-filters"></div></div>
          <div class="beat-list" id="beat-list"></div>
        </div>
      </div>
    </section>

    <section class="section-shell section-space about-section content-section" id="about" data-section="about">
      <div class="about-card reveal">
        <div class="about-portrait"><div class="portrait-orbit"></div><img data-about-mascot alt="阿光角色形象" /></div>
        <div class="about-copy"><p class="eyebrow" data-about-eyebrow></p><h2 data-about-title></h2><p data-about-description></p><div class="tag-list" data-about-tags></div></div>
      </div>
    </section>

    <section class="contact-section section-space content-section" id="contact" data-section="contact">
      <div class="section-shell contact-grid">
        <div class="contact-copy reveal"><p class="eyebrow" data-contact-eyebrow></p><h2 data-contact-title></h2><p data-contact-description></p><div class="contact-links" id="contact-links"></div></div>
        <form class="contact-form glass-card reveal" id="contact-form">
          <label>怎麼稱呼你？<input type="text" name="name" placeholder="你的名字或暱稱" required /></label>
          <label>想合作的項目？<select name="service" id="service-select" required><option value="">請選擇</option></select></label>
          <label>作品與需求<textarea name="message" rows="5" placeholder="可以放 Demo 連結、參考歌、預算與希望完成時間" required></textarea></label>
          <button class="button button-primary submit-button" type="submit" data-form-button></button>
          <p class="form-note">送出後會開啟你的電子郵件軟體，不會把訪客資料儲存在網站。</p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="brand footer-brand"><span class="brand-mark" data-brand-mark>A</span><span><strong data-brand-name>阿光音樂製作</strong><small data-brand-en>A-KUANG MUSIC</small></span></div>
    <p>© <span id="year"></span> <span data-brand-en>A-KUANG MUSIC</span>. All rights reserved.</p>
    <div class="footer-actions"><a href="admin.html" rel="nofollow">ADMIN</a><a href="#top">BACK TO TOP ↑</a></div>
  </footer>

  <dialog class="media-dialog" id="media-dialog">
    <button class="dialog-close" type="button" aria-label="關閉">×</button>
    <div class="media-dialog-body" id="media-dialog-body"></div>
  </dialog>
  <div class="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="default-content.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
